<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dusky Leaf Games</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: rgb(0, 0, 0);
            background-image: linear-gradient(
            180deg, 
            #ffffff 50%,
            #fff4e6 75%,
            #2cc56b 100%
            );

        }
        .container {
            text-align: center;
            padding: 20px;
        }

        img {
            /* clamp(minimum, preferred, maximum) */
            width: clamp(70%, 10vw + 50%, 100%);
            height: auto;
        }
        p {
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 0.9rem;
            opacity: 0.6;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Dusky_Leaf_Games_Logo_Final_1.png" alt="Dusky Leaf Games Logo">
    </div>
</body>
</html>
